<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/png" href="logo.png">
  <title>Support Nigam Kumari</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #FF5800;
      --blue: #0051A2;
      --yellow: #FFD500;
      --green: #009B48;
      --orange: #C41E3A;
      --bg: #08080f;
      --bg2: #0e0e18;
      --text: #e8e8f2;
      --dim: #7a7a99;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .logo-cube {
      width: 28px;
      height: 28px;
      transform-style: preserve-3d;
      animation: logoSpin 5s linear infinite;
      position: relative;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      box-shadow: 0 0 16px rgba(196, 30, 58, .5);
    }

    @keyframes logoSpin {
      from { transform: rotateY(0deg) rotateX(15deg); }
      to { transform: rotateY(360deg) rotateX(15deg); }
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      padding: 18px 60px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background: rgba(8, 8, 15, .95);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .support {
      text-align: center;
      padding: 120px 20px 60px;
    }

    .support h1 {
      font-size: 2.5rem;
      margin-bottom:10px;
    }

    .support p {
      color: var(--dim);
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .amounts button {
      margin: 10px;
      padding: 14px 22px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .amounts button:hover {
      transform: translateY(-3px);
      border-color: var(--yellow);
      color: var(--yellow);
      box-shadow: 0 0 20px rgba(255,213,0,0.3);
    }

    input {
      margin-top: 15px;
      padding: 12px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      text-align: center;
      outline: none;
    }

    input:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 10px rgba(255,213,0,0.2);
    }

    button {
      margin-top: 20px;
      cursor: pointer;
    }

    .card > button {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.25s ease;
      box-shadow: 0 0 30px rgba(255,88,0,0.3);
    }

    .card > button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(255,88,0,0.5);
    }



    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      z-index: 9998;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
      width: 0;
    }

    @media (max-width: 860px) {
      nav { padding: 18px 24px; }
      .support { padding: 120px 20px 60px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html#hero" class="logo">
      <div class="logo-cube"></div>
      Nigam Kumari
    </a>
  </nav>

  <canvas id="bg-canvas"></canvas>
  <div id="progress"></div>

  <section class="support">
    <h1>Support the Developer ❤️</h1>
    <p>
      If my work helped you even a little, you can support Nigam Kumari here.
      Every contribution helps build bigger things!
    </p>

    <div class="card">
      <h2>Select Amount</h2>

      <div class="amounts">
        <button onclick="pay(10)">₹10 • Coffee</button>
        <button onclick="pay(100)">₹100 • Appreciate</button>
        <button onclick="pay(1000)">₹1000 • Backer</button>
      </div>

      <input type="number" id="customAmount" placeholder="Enter custom amount" />

      <button onclick="customPay()">Proceed</button>
    </div>

    <div id="qrContainer"></div>
    <p style="color:var(--dim);font-size:.8rem">
      Secure UPI payment • No data stored
    </p>

  </section>

  <script>
function generateUPI(amount) {
    return `upi://pay?pa=7837736168@pz&pn=Support%20Nigam%20Kumari&cu=INR&am=${amount}&tn=Support`;
  }

  function pay(amount) {
    const upi = generateUPI(amount);
    window.location.href = upi;
    showQR(amount, upi);
  }

  function customPay() {
    const input = document.getElementById("customAmount");
    const amount = parseInt(input.value);
    if (isNaN(amount) || amount < 1) {
      input.style.borderColor = '#ff6b6b';
      input.style.boxShadow = '0 0 0 3px rgba(255,107,107,.2)';
      setTimeout(() => {
        input.style.borderColor = '';
        input.style.boxShadow = '';
      }, 2000);
      return;
    }
    input.value = '';
    pay(amount);
  }

  function showQR(amount, upiLink) {
    const container = document.getElementById("qrContainer");
    container.innerHTML = `
      <div style="margin-top:40px">
        <h3 style="color:var(--yellow)">Complete Payment</h3>
        <p style="color:var(--dim)">If UPI app didn't open, scan QR</p>
        <img 
          src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(upiLink)}&choe=UTF-8"
          style="margin-top:20px;border-radius:12px;background:white;padding:10px;display:block;margin:0 auto;"
          alt="UPI QR Code"
          onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1NSUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkZhbGxiYWNrPC90ZXh0Pjwvc3ZnPg==';this.onerror=null;"
        />
        <p style="margin-top:15px;color:var(--dim)">Amount: ₹${amount}</p>
        <p style="font-size:.8rem;color:var(--dim)">UPI ID: 7837736168@pz</p>
      </div>
    `;
  }



  // Scroll progress
  const prog = document.getElementById('progress');
  window.addEventListener('scroll', () => {
    prog.style.width = (window.scrollY / (document.documentElement.scrollHeight - innerHeight) * 100) + '%';
  }, { passive: true });

  // Particles
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const PCOLS = ['#FF5800', '#0051A2', '#FFD500', '#009B48', '#C41E3A'];
  function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resizeCanvas(); window.addEventListener('resize', resizeCanvas);
  class Particle {
    constructor() { this.init(true); }
    init(rand) {
      this.x = Math.random() * canvas.width;
      this.y = rand ? Math.random() * canvas.height : canvas.height + 10;
      this.sz = Math.random() * 7 + 2;
      this.col = PCOLS[Math.floor(Math.random() * PCOLS.length)];
      this.vx = (Math.random() - .5) * .5;
      this.vy = -(Math.random() * .45 + .1);
      this.rot = Math.random() * Math.PI * 2;
      this.spin = (Math.random() - .5) * .045;
      this.a = Math.random() * .12 + .02;
    }
    tick() {
      this.x += this.vx; this.y += this.vy; this.rot += this.spin;
      if (this.y < -12 || this.x < -12 || this.x > canvas.width + 12) this.init(false);
    }
    draw() {
      ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);
      ctx.globalAlpha = this.a; ctx.fillStyle = this.col;
      ctx.fillRect(-this.sz / 2, -this.sz / 2, this.sz, this.sz);
      ctx.restore();
    }
  }
  const parts = Array.from({ length: 72 }, () => new Particle());
  (function tickP() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(p => { p.tick(); p.draw(); });
    requestAnimationFrame(tickP);
  })();
  </script>

</body>
</html>
